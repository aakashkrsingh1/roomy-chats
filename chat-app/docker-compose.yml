version: '3.8'
services:
  mongo:
    image: mongo:5.0
    container_name: mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo-db:/data/db
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - app-network
    command: redis-server --appendonly yes

  boot-app:
     image: aakashkrsingh1/chatapp
     build:
       context: .
       dockerfile: Dockerfile
     ports:
       - "8080:8080"
     environment:
       - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/chatapp
       - REDIS_HOST=redis
       - REDIS_PORT=6379
       - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
     depends_on:
       - mongo
       - redis

     networks:
       - app-network

volumes:
  mongo-db:

networks:
  app-network:
